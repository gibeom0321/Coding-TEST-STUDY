name: Move Baekjoon Files

on:
  push:
    paths:
      - '백준/**'

jobs:
  move-files:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: Git 설정
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: 파일 이동
        run: |
          mkdir -p Week1

          for file in $(find 백준 -type f); do
            filename=$(basename "$file")
            mv "$file" "Week1/$filename"
          done

      - name: 변경사항 커밋
        run: |
          git add .
          git commit -m "자동 이동: 백준 → Week1" || echo "No changes"
          git push
