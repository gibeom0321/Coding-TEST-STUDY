name: Move Silver Problems to Week1

on:
  push:
    paths:
      - '백준/Silver/**'

jobs:
  move-files:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: Git 설정
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Silver → week1 이동
        run: |
          mkdir -p week1

          for file in $(find 백준/Silver -type f); do
            filename=$(basename "$file")
            mv "$file" "week1/$filename"
          done

      - name: 변경사항 커밋
        run: |
          git add .
          git commit -m "자동 이동: Silver → week1" || echo "No changes"
          git push
